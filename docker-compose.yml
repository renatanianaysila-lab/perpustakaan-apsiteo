services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: perpustakaan-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
      # Tambahkan env vars lain jika diperlukan
    volumes:
      - db-data:/var/www/html/database

volumes:
  db-data:
